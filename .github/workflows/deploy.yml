name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Repo → Settings → Secrets and variables → Actions. Required: AUTH_*_HASH (see scripts/generate-auth-hashes.js).
      # Optional: GIST_* for sidebar Push/Pull (use a PAT with gist scope only).
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_USERNAME_HASH: ${{ secrets.NEXT_PUBLIC_AUTH_USERNAME_HASH }}
          NEXT_PUBLIC_AUTH_PASSWORD_HASH: ${{ secrets.NEXT_PUBLIC_AUTH_PASSWORD_HASH }}
          NEXT_PUBLIC_GIST_TOKEN: ${{ secrets.NEXT_PUBLIC_GIST_TOKEN }}
          NEXT_PUBLIC_GIST_ID: ${{ secrets.NEXT_PUBLIC_GIST_ID }}
          BASE_PATH: /noda

      - name: Check build output
        run: ls -la out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
